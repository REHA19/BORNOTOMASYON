name: BornOtomasyon
options:
  bundleIdPrefix: com.bornotomasyon
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: YES

configs:
  Debug: debug
  Release: release

targets:
  BornOtomasyon:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Models
      - path: ViewModels
      - path: Views
      - path: Services
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bornotomasyon.app
        INFOPLIST_FILE: App/Info.plist
        DEVELOPMENT_TEAM: ""
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
