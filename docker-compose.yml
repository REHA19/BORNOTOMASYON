services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: born
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: born_otomasyon
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./Backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://born:${DB_PASSWORD:-changeme}@db:5432/born_otomasyon
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    ports:
      - "8080:8080"

  frontend:
    build: ./Frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
